<svg width="680" height="810" viewBox="0 0 680 810" xmlns="http://www.w3.org/2000/svg" role="img">
<title>VarViz workflow architecture</title>
<desc>Data flow from user input through eight external APIs to ACMG engine, variant cards, protein landscape, and split plot/TSV outputs</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th  { font-size: 14px; font-weight: 600; fill: #1a1a2e; }
    .ts  { font-size: 12px; font-weight: 400; fill: #4a4a6a; }
    .sm  { font-size: 10px; font-weight: 400; fill: #4a4a6a; }
    /* color classes */
    .purple rect, .purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .purple .th { fill: #3C3489; }
    .purple .ts { fill: #534AB7; }
    .teal rect   { fill: #E1F5EE; stroke: #0F6E56; }
    .teal .th    { fill: #085041; }
    .teal .ts    { fill: #0F6E56; }
    .coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .coral .th   { fill: #712B13; }
    .coral .ts   { fill: #993C1D; }
    .amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .amber .th   { fill: #633806; }
    .amber .ts   { fill: #854F0B; }
    .gray rect   { fill: #F1EFE8; stroke: #5F5E5A; }
    .gray .th    { fill: #444441; }
    .gray .ts    { fill: #5F5E5A; }
    .arr { stroke: #888780; stroke-width: 1; fill: none; }
    line.arr { marker-end: url(#arrow); }
  </style>
</defs>

<!-- bg -->
<rect width="680" height="810" fill="#ffffff"/>

<!-- USER INPUT -->
<g class="purple">
  <rect x="220" y="20" width="240" height="48" rx="8" stroke-width="0.8"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">User input</text>
  <text class="ts" x="340" y="57" text-anchor="middle" dominant-baseline="central">Gene symbol + p.notation variants</text>
</g>
<line x1="340" y1="68" x2="340" y2="94" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

<!-- SESSION CACHE -->
<g class="gray">
  <rect x="246" y="94" width="188" height="36" rx="8" stroke-width="0.8"/>
  <text class="th" x="340" y="105" text-anchor="middle" dominant-baseline="central">In-session cache</text>
  <text class="ts" x="340" y="120" text-anchor="middle" dominant-baseline="central">Per-gene API response store</text>
</g>
<line x1="340" y1="130" x2="340" y2="152" class="arr" stroke="#888780" marker-end="url(#arrow)"/>

<!-- API ROW 1 -->
<g class="teal"><rect x="30"  y="152" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="100" y="171" text-anchor="middle" dominant-baseline="central">UniProt</text>
  <text class="ts" x="100" y="188" text-anchor="middle" dominant-baseline="central">Domains, PTMs, topology</text></g>
<g class="teal"><rect x="182" y="152" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="252" y="171" text-anchor="middle" dominant-baseline="central">AlphaFold EBI</text>
  <text class="ts" x="252" y="188" text-anchor="middle" dominant-baseline="central">pLDDT, AlphaMissense</text></g>
<g class="teal"><rect x="334" y="152" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="404" y="171" text-anchor="middle" dominant-baseline="central">gnomAD v4</text>
  <text class="ts" x="404" y="188" text-anchor="middle" dominant-baseline="central">AF, AC, homozygotes</text></g>
<g class="teal"><rect x="486" y="152" width="164" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="568" y="171" text-anchor="middle" dominant-baseline="central">ClinVar</text>
  <text class="ts" x="568" y="188" text-anchor="middle" dominant-baseline="central">Stars, VCVs, assertions</text></g>

<!-- API ROW 2 -->
<g class="teal"><rect x="30"  y="218" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="100" y="237" text-anchor="middle" dominant-baseline="central">MyVariant.info</text>
  <text class="ts" x="100" y="254" text-anchor="middle" dominant-baseline="central">dbNSFP v4 — 15 scores</text></g>
<g class="teal"><rect x="182" y="218" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="252" y="237" text-anchor="middle" dominant-baseline="central">UCSC / Ensembl</text>
  <text class="ts" x="252" y="254" text-anchor="middle" dominant-baseline="central">PhyloP, PhastCons</text></g>
<g class="teal"><rect x="334" y="218" width="140" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="404" y="237" text-anchor="middle" dominant-baseline="central">ClinGen / GenCC</text>
  <text class="ts" x="404" y="254" text-anchor="middle" dominant-baseline="central">Gene-disease validity</text></g>
<g class="teal"><rect x="486" y="218" width="164" height="52" rx="8" stroke-width="0.8"/>
  <text class="th" x="568" y="237" text-anchor="middle" dominant-baseline="central">GeVIR</text>
  <text class="ts" x="568" y="254" text-anchor="middle" dominant-baseline="central">Missense constraint pct</text></g>

<!-- collector lines -->
<line x1="100" y1="204" x2="100" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="252" y1="204" x2="252" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="404" y1="204" x2="404" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="568" y1="204" x2="568" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="100" y1="270" x2="100" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="252" y1="270" x2="252" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="404" y1="270" x2="404" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="568" y1="270" x2="568" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="100" y1="286" x2="568" y2="286" stroke="#888780" stroke-width="0.5" opacity="0.5"/>
<line x1="340" y1="286" x2="340" y2="362" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LOCAL FILES -->
<g class="gray"><rect x="30" y="316" width="140" height="36" rx="8" stroke-width="0.8"/>
  <text class="th" x="100" y="327" text-anchor="middle" dominant-baseline="central">Local files</text>
  <text class="ts" x="100" y="342" text-anchor="middle" dominant-baseline="central">CCRS, gene coords</text></g>
<path d="M170 334 L190 334 L190 380 L218 380" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- CLINICAL INPUTS -->
<g class="gray"><rect x="510" y="316" width="140" height="36" rx="8" stroke-width="0.8"/>
  <text class="th" x="580" y="327" text-anchor="middle" dominant-baseline="central">Clinical inputs</text>
  <text class="ts" x="580" y="342" text-anchor="middle" dominant-baseline="central">De novo, PP1, PM3</text></g>
<path d="M510 334 L490 334 L490 380 L462 380" stroke="#888780" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

<!-- ACMG ENGINE -->
<g class="purple">
  <rect x="120" y="362" width="440" height="44" rx="8" stroke-width="0.8"/>
  <text class="th" x="340" y="387" text-anchor="middle" dominant-baseline="central">ACMG / AMP classification engine</text>
</g>
<line x1="340" y1="406" x2="340" y2="430" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- VARIANT CARDS -->
<g class="coral">
  <rect x="120" y="430" width="440" height="44" rx="8" stroke-width="0.8"/>
  <text class="th" x="340" y="448" text-anchor="middle" dominant-baseline="central">Per-variant evidence cards</text>
  <text class="ts" x="340" y="464" text-anchor="middle" dominant-baseline="central">40+ columns · ACMG criterion grid · PP1 / PM3 dropdowns · ClinVar stars</text>
</g>
<line x1="340" y1="474" x2="340" y2="498" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PROTEIN LANDSCAPE -->
<g class="coral">
  <rect x="120" y="498" width="440" height="72" rx="8" stroke-width="0.8"/>
  <text class="th" x="340" y="516" text-anchor="middle" dominant-baseline="central">Interactive protein landscape</text>
  <text class="sm" x="340" y="534" text-anchor="middle">pLDDT · gnomAD · Mutation density · AlphaMissense mean pathogenicity</text>
  <text class="sm" x="340" y="550" text-anchor="middle">ClinVar / PTM / CCRS · Multi-conservation · ConSurf · UniProt domains</text>
</g>

<!-- split arrows -->
<line x1="230" y1="570" x2="175" y2="598" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="570" x2="505" y2="598" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- PLOT OUTPUTS -->
<g class="amber">
  <rect x="30" y="598" width="290" height="148" rx="8" stroke-width="0.8"/>
  <text class="th" x="175" y="622" text-anchor="middle" dominant-baseline="central">Plot outputs</text>
</g>
<g class="amber">
  <rect x="44"  y="634" width="124" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="106" y="646" text-anchor="middle" dominant-baseline="central">Interactive HTML</text>
  <text class="ts" x="106" y="661" text-anchor="middle" dominant-baseline="central">Plotly / Shiny</text>
</g>
<g class="amber">
  <rect x="182" y="634" width="124" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="244" y="646" text-anchor="middle" dominant-baseline="central">Static export</text>
  <text class="ts" x="244" y="661" text-anchor="middle" dominant-baseline="central">PDF / PNG / JPEG</text>
</g>
<g class="amber">
  <rect x="44"  y="684" width="262" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="175" y="696" text-anchor="middle" dominant-baseline="central">Publication-quality cowplot figure</text>
  <text class="ts" x="175" y="711" text-anchor="middle" dominant-baseline="central">All tracks aligned to protein length</text>
</g>

<!-- TSV EXPORT -->
<g class="amber">
  <rect x="350" y="598" width="300" height="148" rx="8" stroke-width="0.8"/>
  <text class="th" x="500" y="622" text-anchor="middle" dominant-baseline="central">TSV export</text>
</g>
<g class="amber">
  <rect x="364" y="634" width="124" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="426" y="646" text-anchor="middle" dominant-baseline="central">Variant annotations</text>
  <text class="ts" x="426" y="661" text-anchor="middle" dominant-baseline="central">40+ columns</text>
</g>
<g class="amber">
  <rect x="502" y="634" width="134" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="569" y="646" text-anchor="middle" dominant-baseline="central">ACMG tags + pts</text>
  <text class="ts" x="569" y="661" text-anchor="middle" dominant-baseline="central">PP1 / PM3 applied</text>
</g>
<g class="amber">
  <rect x="364" y="684" width="272" height="36" rx="6" stroke-width="0.8"/>
  <text class="ts" x="500" y="696" text-anchor="middle" dominant-baseline="central">Final classification + narrative</text>
  <text class="ts" x="500" y="711" text-anchor="middle" dominant-baseline="central">ACMG comment per variant</text>
</g>

<!-- LEGEND -->
<rect x="30" y="762" width="620" height="32" rx="6" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="44"  y="772" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text class="ts" x="58"  y="779">External APIs</text>
<rect x="160" y="772" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text class="ts" x="174" y="779">Classification engine</text>
<rect x="308" y="772" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text class="ts" x="322" y="779">Visualization</text>
<rect x="420" y="772" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text class="ts" x="434" y="779">Outputs</text>
<rect x="506" y="772" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text class="ts" x="520" y="779">Local / user data</text>
</svg>
